<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Superhero Explorer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-animation">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>
    
    <main class="container">
        <header>
            <h1 class="glow-text">Superhero Explorer</h1>
            <p class="subtitle">Discover heroes and villains from Marvel and DC</p>
        </header>

        <section class="chat-container">
            <div id="chatHistory" class="chat-history">
                <!-- Initial welcome message -->
                <div class="message bot-message">
                    <div class="message-content">
                        Hello! I'm the Batcomputer... well, a friendly AI anyway. Ask me about your favorite Marvel or DC superhero!
                    </div>
                </div>
            </div>
            
            <div class="chat-input-wrapper">
                <input type="text" id="chatInput" placeholder="Type a message (e.g., 'Tell me about Spider-Man')..." autocomplete="off">
                <button id="sendBtn" class="send-btn" aria-label="Send message">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
