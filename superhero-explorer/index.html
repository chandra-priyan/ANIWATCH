<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Superhero Explorer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-animation">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>
    
    <main class="container">
        <header>
            <h1 class="glow-text">Superhero Explorer</h1>
            <p class="subtitle">Discover heroes and villains from Marvel and DC</p>
        </header>

        <section class="search-section">
            <div class="search-wrapper">
                <input type="text" id="searchInput" placeholder="Search for a superhero..." autocomplete="off">
                <div class="search-icon">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="css-i6dzq1"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </div>
            </div>
        </section>

        <section id="resultContainer" class="result-container">
            <!-- Cards will be dynamically injected here -->
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
